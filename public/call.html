<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Call</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<!-- LANDING -->
<div id="landing">
  <div class="landing-card">

    <div class="brand">
      <div class="brand-icon">⬡</div>
      <div>
        <h1>NEXUS</h1>
        <span>P2P Video Conferencing</span>
      </div>
    </div>

    <div class="landing-title">
      Connect <em>instantly.</em><br>No downloads.
    </div>

    <div class="landing-sub">
      // WebRTC · no account needed
    </div>

    <div class="field-group">
      <div class="field-label">Your display name</div>
      <input type="text" id="display-name" placeholder="Enter your name..." maxlength="30">
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="App.createRoom()">⬡ Create Room</button>
    </div>

    <div class="divider">or join existing</div>

    <div class="field-group">
      <div class="field-label">Meeting ID</div>
      <input type="text" id="join-room-id" placeholder="ABCD1234">
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="App.joinRoom()">Join Meeting</button>
    </div>

    <div class="landing-footer">
      <div class="conn-indicator" id="server-status">
        <div class="dot dot-yellow"></div>
        <span>Connecting to server...</span>
      </div>
    </div>

  </div>
</div>

<!-- CALL SCREEN -->
<div id="call-screen">

  <div class="topbar">
    <div class="topbar-brand">NEXUS</div>
    <div id="topbar-room-id">—</div>
    <div id="conn-status">Connecting...</div>
    <div id="call-timer">00:00</div>
  </div>

  <div class="video-area">

    <div class="videos-grid" id="videos-grid">
      <div class="empty-state" id="empty-state">
        <div class="empty-text">Waiting for others to join...</div>
      </div>
    </div>

    <!-- LOCAL VIDEO -->
    <div id="local-pip">
      <video id="local-video" autoplay muted playsinline></video>
    </div>

  </div>

</div>

<!-- SOCKET -->
<script src="/socket.io/socket.io.js"></script>

<!-- 🔥 CORRECT ORDER -->
<script src="/js/ui.js"></script>
<script src="/js/webrtc.js"></script>
<script src="/js/prefill.js"></script> <!-- ✅ ONLY ONCE -->
<script src="/js/app.js"></script>

</body>
</html>
